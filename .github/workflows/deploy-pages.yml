name: Deploy TVio Lite (web) to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: npm ci || { echo "::warning::package-lock.json is out of sync with package.json — falling back to npm install"; npm install; }
      - name: Build web
        run: npm run build
        env:
          VITE_TMDB_KEY: ${{ secrets.VITE_TMDB_KEY }}
          VITE_TMDB_TOKEN: ${{ secrets.VITE_TMDB_TOKEN }}
          VITE_TMDB_REGION: ${{ secrets.VITE_TMDB_REGION }}
          VITE_TMDB_PROXY: ${{ secrets.VITE_TMDB_PROXY }}
          VITE_OMDB_KEY: ${{ secrets.VITE_OMDB_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: SPA fallback (404 = index for deep links)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
