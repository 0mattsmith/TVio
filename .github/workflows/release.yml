name: Release binaries (Windows + Android)

# Cut a release by pushing a version tag, e.g.  git tag v0.1.2 && git push --tags
# (run.ps1 -Tag v0.1.2 does this for you). The release is created first, then the
# Windows and Android jobs build IN PARALLEL and attach their assets to it.
# workflow_dispatch builds artifacts without creating a release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Create the release up front so both build jobs can upload to it without
  # racing each other to create it — but as a PRERELEASE.
  #
  # GitHub excludes prereleases from /releases/latest, which is exactly where
  # the in-app updater looks. Publishing immediately meant the newest release
  # became "latest" while still empty, so every running app asked it for
  # latest.json, got a 404, and concluded it was up to date — for the whole
  # build, and forever if a build failed. It stays a prerelease until both
  # binaries are attached (see publish-release at the bottom).
  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TVio ${{ github.ref_name }}
          draft: false
          prerelease: true
          body: |
            Automated TVio build.

            | Download | For |
            | --- | --- |
            | `TVio_*_x64_en-US.msi` / `TVio_*-setup.exe` | Windows (auto-updates silently) |
            | `tvio-mobile.apk` | Android phones/tablets |
            | `tvio-androidtv.apk` | Android TV / Google TV |

            The web version (TVio Lite) is deployed automatically to GitHub Pages.

  windows:
    name: Windows desktop (TVio)
    needs: create-release
    if: ${{ always() && needs.create-release.result != 'failure' }}
    runs-on: windows-latest
    env:
      VITE_TMDB_KEY: ${{ secrets.VITE_TMDB_KEY }}
      VITE_TMDB_TOKEN: ${{ secrets.VITE_TMDB_TOKEN }}
      VITE_TMDB_REGION: ${{ secrets.VITE_TMDB_REGION }}
      VITE_TMDB_PROXY: ${{ secrets.VITE_TMDB_PROXY }}
      VITE_OMDB_KEY: ${{ secrets.VITE_OMDB_KEY }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      # Caches ~/.cargo and src-tauri/target — the single biggest win here,
      # cutting repeat builds from ~10 min to ~2-3 min.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      # Tauri downloads its OWN vendored NSIS/WiX at bundle time (not the system
      # ones), which is what timed out. Caching them means it's fetched once and
      # reused, so a flaky download can't break a release.
      - name: Cache Tauri bundler tools (NSIS / WiX)
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/tauri
            ~/.cargo/tauri
          key: tauri-bundler-tools-${{ runner.os }}-v1
      - name: Sync version from the release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-version.mjs "${{ github.ref_name }}"
      - name: Install dependencies
        shell: bash
        run: npm ci || { echo "::warning::package-lock.json is out of sync with package.json — falling back to npm install"; npm install; }
      # Branded app icon + installer artwork (sharp comes from devDependencies)
      - name: Generate icon + installer artwork
        run: node scripts/gen-installer-assets.mjs
      - run: npx @tauri-apps/cli icon build/icon-1024.png
      - name: Build desktop app (MSI + NSIS) and attach to release
        id: bundle
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the update artifacts so the silent updater will accept them.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: TVio ${{ github.ref_name }}
          releaseDraft: false
          # Must stay true, or this would republish the release mid-build and
          # re-expose an incomplete one to the updater.
          prerelease: true
      # The bundler fetches NSIS/WiX over the network, which occasionally times
      # out ("failed to bundle project: timeout: global"). One retry clears it.
      - name: Retry bundle (transient download failures)
        if: steps.bundle.outcome == 'failure'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: TVio ${{ github.ref_name }}
          releaseDraft: false
          # Must stay true, or this would republish the release mid-build and
          # re-expose an incomplete one to the updater.
          prerelease: true
      # continue-on-error above means a double bundle failure would otherwise
      # leave this job GREEN with nothing built — the release gets no installer
      # and no latest.json, so every desktop app silently stays on its old
      # version with no error anywhere to explain why. Fail loudly instead.
      - name: Verify installer + updater artifacts exist
        shell: bash
        run: |
          shopt -s nullglob
          nsis=(src-tauri/target/release/bundle/nsis/*-setup.exe)
          msi=(src-tauri/target/release/bundle/msi/*.msi)
          sigs=(src-tauri/target/release/bundle/nsis/*.sig src-tauri/target/release/bundle/msi/*.sig)
          echo "NSIS: ${nsis[*]:-NONE}"
          echo "MSI:  ${msi[*]:-NONE}"
          echo "SIGs: ${sigs[*]:-NONE}"
          if [ ${#nsis[@]} -eq 0 ] && [ ${#msi[@]} -eq 0 ]; then
            echo "::error::No installer produced — the bundle step failed both times."
            exit 1
          fi
          if [ ${#sigs[@]} -eq 0 ]; then
            echo "::error::No .sig files. Without signed updater artifacts there is no latest.json, so the in-app updater can never see this release. Check the TAURI_SIGNING_PRIVATE_KEY secret."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: tvio-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  android:
    name: Android phone + TV APKs
    needs: create-release
    if: ${{ always() && needs.create-release.result != 'failure' }}
    runs-on: ubuntu-latest
    env:
      VITE_TMDB_KEY: ${{ secrets.VITE_TMDB_KEY }}
      VITE_TMDB_TOKEN: ${{ secrets.VITE_TMDB_TOKEN }}
      VITE_TMDB_REGION: ${{ secrets.VITE_TMDB_REGION }}
      VITE_TMDB_PROXY: ${{ secrets.VITE_TMDB_PROXY }}
      VITE_OMDB_KEY: ${{ secrets.VITE_OMDB_KEY }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      # NB: setup-java's built-in `cache: gradle` can't be used here — it looks
      # for Gradle files at this point, but the Android project isn't scaffolded
      # until later in the job. Cache the Gradle home explicitly instead, keyed
      # on our lockfile (which determines the Capacitor/Gradle dependency set).
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - uses: android-actions/setup-android@v3
      # Decode the release keystore if it's configured. When it isn't (forks,
      # or before the secret is set) the build falls back to a debug key — which
      # still installs, it just can't update over a previous install.
      - name: Prepare signing keystore
        id: signing
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No ANDROID_KEYSTORE_BASE64 secret — building debug-signed APKs (can't update over the top)."
            exit 0
          fi

          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/tvio.keystore"

          # Preflight the credentials with keytool, so a wrong password fails
          # here in seconds with a clear message rather than deep inside the
          # Gradle packageRelease task five minutes later.
          if ! keytool -list -keystore "$RUNNER_TEMP/tvio.keystore" -storepass "$KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "::error::ANDROID_KEYSTORE_PASSWORD doesn't match the keystore. Re-enter the secret with no quotes and no trailing spaces — it must be exactly the password you typed into keytool."
            exit 1
          fi
          if ! keytool -list -keystore "$RUNNER_TEMP/tvio.keystore" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "::error::ANDROID_KEY_ALIAS ('$KEY_ALIAS') isn't in the keystore. It should be 'tvio' unless you changed it. keytool stores aliases in lowercase."
            exit 1
          fi

          echo "signed=true" >> "$GITHUB_OUTPUT"
          echo "Release keystore verified — APKs will be release-signed."
      - name: Sync version from the release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-version.mjs "${{ github.ref_name }}"
      - name: Install dependencies
        shell: bash
        run: npm ci || { echo "::warning::package-lock.json is out of sync with package.json — falling back to npm install"; npm install; }
      - name: Build web bundle
        run: npm run build
      - name: Scaffold Android project
        run: npx cap add android
      - run: npx cap sync android
      - name: Inject APK self-updater (plugin + permission + FileProvider)
        run: node scripts/android-updater-patch.mjs
      # NOT continue-on-error: a skipped run ships the stock Android robot icon,
      # which looks like a product bug rather than a build warning.
      - name: Generate branded launcher icons + TV banner
        run: node scripts/gen-android-assets.mjs
      - name: Build phone APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/tvio.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          node scripts/inject-platform.mjs mobile
          node scripts/android-signing-patch.mjs
          cd android
          chmod +x gradlew
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            ./gradlew assembleRelease --no-daemon
            cp app/build/outputs/apk/release/app-release.apk ../tvio-mobile.apk
          else
            ./gradlew assembleDebug --no-daemon
            cp app/build/outputs/apk/debug/app-debug.apk ../tvio-mobile.apk
          fi
      # Files on disk are not the same thing as resources in the APK. Resource
      # merging can quietly prefer a template's variant over ours, which is
      # exactly how the stock icon kept shipping while generation "succeeded".
      - name: Verify the icons actually reached the APK
        run: |
          echo "--- launcher resources inside tvio-mobile.apk ---"
          unzip -l tvio-mobile.apk | grep -Ei "ic_launcher|banner" || echo "  none found"
          echo
          echo "--- does the packaged icon match the one we generated? ---"
          src=$(md5sum android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png | cut -d' ' -f1)
          pkg=$(unzip -p tvio-mobile.apk res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null | md5sum | cut -d' ' -f1)
          echo "  generated: $src"
          echo "  packaged:  $pkg"
          if [ "$src" != "$pkg" ]; then
            echo "::warning::The packaged launcher icon differs from the generated one — resource merging is overriding it."
          else
            echo "  match"
          fi

      - name: Apply Android TV (leanback) manifest
        run: node scripts/android-tv-manifest.mjs
      - name: Build Android TV APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/tvio.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          node scripts/inject-platform.mjs tv
          cd android
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            ./gradlew assembleRelease --no-daemon
            cp app/build/outputs/apk/release/app-release.apk ../tvio-androidtv.apk
          else
            ./gradlew assembleDebug --no-daemon
            cp app/build/outputs/apk/debug/app-debug.apk ../tvio-androidtv.apk
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: tvio-android
          path: tvio-*.apk
      - name: Attach APKs to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          files: |
            tvio-mobile.apk
            tvio-androidtv.apk

  # The gate. Flipping prerelease off is what makes GitHub treat this as
  # /releases/latest, so it only happens once BOTH binaries are attached. If
  # either job fails the release stays a prerelease and the updater keeps
  # pointing at the last complete one, rather than a broken newer one.
  publish-release:
    name: Publish release (both builds succeeded)
    needs: [create-release, windows, android]
    if: >-
      ${{ startsWith(github.ref, 'refs/tags/v')
      && needs.windows.result == 'success'
      && needs.android.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
