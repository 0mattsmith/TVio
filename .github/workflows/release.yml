name: Release binaries (Windows + Android)

# Cut a release by pushing a version tag, e.g.  git tag v0.1.0 && git push --tags
# (run.ps1 -Tag v0.1.0 does this for you). Assets are attached to the GitHub
# Release for that tag. workflow_dispatch builds artifacts without a release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows desktop (TVio)
    runs-on: windows-latest
    env:
      VITE_TMDB_KEY: ${{ secrets.VITE_TMDB_KEY }}
      VITE_TMDB_TOKEN: ${{ secrets.VITE_TMDB_TOKEN }}
      VITE_TMDB_REGION: ${{ secrets.VITE_TMDB_REGION }}
      VITE_OMDB_KEY: ${{ secrets.VITE_OMDB_KEY }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      # Generate app icons from public/icon.svg (skip if src-tauri/icons committed)
      - run: npm install --no-save sharp
        continue-on-error: true
      - run: node scripts/gen-icon.mjs
        continue-on-error: true
      - run: npx @tauri-apps/cli icon build/icon-1024.png
        continue-on-error: true
      - name: Build desktop app (MSI + NSIS) and attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: TVio ${{ github.ref_name }}
          releaseBody: Automated TVio build — Windows installer + Android APKs below.
          releaseDraft: false
          prerelease: false
      - uses: actions/upload-artifact@v4
        with:
          name: tvio-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  android:
    name: Android phone + TV APKs
    runs-on: ubuntu-latest
    needs: windows
    env:
      VITE_TMDB_KEY: ${{ secrets.VITE_TMDB_KEY }}
      VITE_TMDB_TOKEN: ${{ secrets.VITE_TMDB_TOKEN }}
      VITE_TMDB_REGION: ${{ secrets.VITE_TMDB_REGION }}
      VITE_OMDB_KEY: ${{ secrets.VITE_OMDB_KEY }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: npm install
      - run: npm install --no-save @capacitor/cli @capacitor/core @capacitor/android
      - name: Build web bundle
        run: npm run build
      - name: Scaffold Android project
        run: npx cap add android
      - run: npx cap sync android
      - name: Build phone APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../tvio-mobile.apk
      - name: Apply Android TV (leanback) manifest
        run: node scripts/android-tv-manifest.mjs
      - name: Build Android TV APK
        run: |
          cd android
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../tvio-androidtv.apk
      - uses: actions/upload-artifact@v4
        with:
          name: tvio-android
          path: tvio-*.apk
      - name: Attach APKs to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            tvio-mobile.apk
            tvio-androidtv.apk
